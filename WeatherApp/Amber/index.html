<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEATHER APP</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./api-config.js"></script>
    <script src="./script.js" defer></script>
</head>

<body>
    <div class="card">
        <div class="search">
            <input type="text" class="search-bar" placeholder="Enter name of City, State">
            <button class="search-btn" aria-label="Search weather">
                <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 1024 1024"
                    height="1.5em" width="1.5em" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M909.6 854.5L649.9 594.8C690.2 542.7 712 479 712 412c0-80.2-31.3-155.4-87.9-212.1-56.6-56.7-132-87.9-212.1-87.9s-155.5 31.3-212.1 87.9C143.2 256.5 112 331.8 112 412c0 80.1 31.3 155.5 87.9 212.1C256.5 680.8 331.8 712 412 712c67 0 130.6-21.8 182.7-62l259.7 259.6a8.2 8.2 0 0 0 11.6 0l43.6-43.5a8.2 8.2 0 0 0 0-11.6zM570.4 570.4C528 612.7 471.8 636 412 636s-116-23.3-158.4-65.6C211.3 528 188 471.8 188 412s23.3-116.1 65.6-158.4C296 211.3 352.2 188 412 188s116.1 23.2 158.4 65.6S636 352.2 636 412s-23.3 116.1-65.6 158.4z">
                    </path>
                </svg>
            </button>
            <button class="location-btn" aria-label="Detect current location">
                <img src="./location.png" alt="location icon" width="20" height="20" />
            </button>
        </div>
        <p class="status-message">Enter a city and press search, or tap detect location.</p>
        <div class="weather loading">
            <h2 class="city">Weather in Denver</h2>
            <h1 class="temp">51°C</h1>
            <div class="flex">
                <img src="https://openweathermap.org/img/wn/04n.png" alt="Cloud icon" class="icon" />
                <div class="description">Cloudy</div>
            </div>
            <div class="status-row">
                <div class="status-card">
                    <div class="status-value humidity">60%</div>
                    <p>Humidity</p>
                </div>
                <div class="status-card">
                    <div class="status-value wind">62 km/h</div>
                    <p>Wind speed</p>
                </div>
            </div>
            <canvas id="weatherChart"></canvas>
        </div>

        <script>
            // Auto-load .env for static site
            window.ENV = {
                OPENWEATHER_API_KEY: 'AIzaSyAOF0rK-8iIZAOgffj2KYViS9fLAeu_5kc',
                OPENCAGE_API_KEY: '089943fd115440dbb4d95b091479e834'
            };
        </script>
    </div>
</body>

</html>
